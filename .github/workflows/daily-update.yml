name: A股每日数据更新

# ════════════════════════════════════════════════════════════════
# 架构说明:
#   东财 API 限制 ~10 秒/次, 3000+ 只股票全量更新需要 ~17 小时。
#   GitHub 托管 Runner 单 job 最长 6 小时。
#
#   解决方案: 每天 3 次定时触发, 每次跑 5 小时, 利用断点续传:
#     Run 1 (16:30 CST): Fundamentals 快照 + K线增量 (开始)
#     Run 2 (22:00 CST): K线续传 + 资金流向 (开始)
#     Run 3 (04:00 CST): 资金流向续传 (收尾)
#
#   数据库: Azure PostgreSQL
#   假日策略: 非交易日全部跳过, 开盘日增量自动补齐缺失天数
# ════════════════════════════════════════════════════════════════

on:
  schedule:
    # Run 1: UTC 08:30 = 北京时间 16:30 (收盘后1.5小时, 等数据源更新)
    - cron: '30 8 * * 1-5'
    # Run 2: UTC 14:00 = 北京时间 22:00
    - cron: '0 14 * * 1-5'
    # Run 3: UTC 20:00 = 北京时间 04:00 (次日凌晨)
    - cron: '0 20 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full-update'
        type: choice
        options:
          - full-update
          - daily-close-update
          - moneyflow
      batch_size:
        description: '每轮拉取股票数'
        required: false
        default: '100'
      interval:
        description: '每只间隔秒数'
        required: false
        default: '10'
      max_minutes:
        description: '最长运行分钟数 (0=无限制)'
        required: false
        default: '300'
      force_run:
        description: '强制运行 (忽略交易日判断)'
        type: boolean
        required: false
        default: false

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # 5.5小时硬限制 (比 max_minutes 多30分钟缓冲)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # ── 1. 拉代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 环境 ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. 测试数据库连接 ──
      - name: Test DB connection
        run: python db.py

      # ── 4. 判断今天是否交易日 ──
      - name: Check trade day
        id: trade_check
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          from _http_utils import is_trade_day, last_trade_day, cn_today

          today = cn_today()
          is_td = is_trade_day(today)
          force = os.environ.get("FORCE_RUN", "false") == "true"

          if is_td:
              print(f"✅ {today} 是交易日")
          else:
              ltd = last_trade_day(today)
              print(f"❌ {today} 不是交易日 (最近交易日: {ltd})")

          should_run = "true" if (is_td or force) else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={should_run}\n")
          PYEOF
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}

      # ── 5. 核心: 全量更新 (带时间墙, 断点续传) ──
      - name: Run update
        if: steps.trade_check.outputs.should_run == 'true'
        env:
          MODE: ${{ github.event.inputs.mode || 'full-update' }}
          BATCH: ${{ github.event.inputs.batch_size || '100' }}
          INTERVAL: ${{ github.event.inputs.interval || '10' }}
          MAX_MIN: ${{ github.event.inputs.max_minutes || '300' }}
        run: |
          echo "═══════════════════════════════════════"
          echo "  模式: $MODE"
          echo "  Batch: $BATCH, Interval: ${INTERVAL}s"
          echo "  时间墙: ${MAX_MIN} 分钟"
          echo "═══════════════════════════════════════"

          if [ "$MODE" = "daily-close-update" ]; then
            python slow_fetcher.py \
              --daily-close-update \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN"
          elif [ "$MODE" = "moneyflow" ]; then
            python slow_fetcher.py \
              --moneyflow --moneyflow-auto \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN"
          else
            python slow_fetcher.py \
              --full-update \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN"
          fi

      # ── 6. 打印状态 ──
      - name: Print status
        if: steps.trade_check.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python slow_fetcher.py --status

      # ── 7. 非交易日跳过 ──
      - name: Skip non-trade day
        if: steps.trade_check.outputs.should_run != 'true'
        run: echo "❌ 今天不是交易日, 跳过更新"
