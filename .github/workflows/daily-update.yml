name: A股每日数据更新

# ════════════════════════════════════════════════════════════════
# 架构说明:
#   数据源已迁移: K线(腾讯) + 资金流向(雪球) + 机构持仓(新浪/AKShare)
#   无严格 API 限制, 2 秒间隔, 3000 只股票全量 ≈ 3-4 小时。
#
#   定时触发: 每天 2 次, 每次跑 5 小时, 利用断点续传:
#     Run 1 (16:30 CST): Fundamentals + K线 + 资金流向 + 机构持仓
#     Run 2 (22:00 CST): 续传收尾 (如果 Run 1 没跑完)
#
#   数据库: Azure PostgreSQL
#   假日策略: 非交易日全部跳过, 开盘日增量自动补齐缺失天数
#   例外: workflow_dispatch 选 institutional 模式时, 季度数据不受交易日限制
# ════════════════════════════════════════════════════════════════

on:
  schedule:
    # Run 1: UTC 08:33 ≈ 北京时间 16:33 (收盘后1.5小时, 避开整点/半点高峰)
    - cron: '33 8 * * 1-5'
    # Run 2: UTC 14:07 ≈ 北京时间 22:07 (续传收尾)
    - cron: '7 14 * * 1-5'

  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full-update'
        type: choice
        options:
          - full-update
          - daily-close-update
          - moneyflow
          - institutional
          - lhb-snapshot
          - dzjy-snapshot
      batch_size:
        description: '每轮拉取股票数'
        required: false
        default: '100'
      interval:
        description: '每只间隔秒数'
        required: false
        default: '2'
      max_minutes:
        description: '最长运行分钟数 (0=无限制)'
        required: false
        default: '300'
      workers:
        description: 'K线并发线程数 (默认3)'
        required: false
        default: '3'
      force_run:
        description: '强制运行 (忽略交易日判断)'
        type: boolean
        required: false
        default: false

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330     # 5.5小时硬限制 (比 max_minutes 多30分钟缓冲)

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # ── 1. 拉代码 ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 环境 ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. 测试数据库连接 ──
      - name: Test DB connection
        run: python db.py

      # ── 4. 判断今天是否交易日 ──
      #   institutional 模式是季度数据, 不受交易日限制, 自动放行
      - name: Check trade day
        id: trade_check
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, '.')
          from _http_utils import is_trade_day, last_trade_day, cn_today

          today = cn_today()
          is_td = is_trade_day(today)
          force = os.environ.get("FORCE_RUN", "false") == "true"
          mode = os.environ.get("MODE", "full-update")
          quarterly = mode == "institutional"

          if is_td:
              print(f"✅ {today} 是交易日")
          else:
              ltd = last_trade_day(today)
              print(f"❌ {today} 不是交易日 (最近交易日: {ltd})")

          if quarterly and not is_td:
              print(f"ℹ️  模式 {mode} 为季度数据, 自动放行")

          should_run = "true" if (is_td or force or quarterly) else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={should_run}\n")
          PYEOF
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          MODE: ${{ github.event.inputs.mode || 'full-update' }}

      # ── 5. 核心: 全量更新 (带时间墙, 断点续传) ──
      - name: Run update
        if: steps.trade_check.outputs.should_run == 'true'
        env:
          MODE: ${{ github.event.inputs.mode || 'full-update' }}
          BATCH: ${{ github.event.inputs.batch_size || '100' }}
          INTERVAL: ${{ github.event.inputs.interval || '10' }}
          MAX_MIN: ${{ github.event.inputs.max_minutes || '300' }}
          WORKERS: ${{ github.event.inputs.workers || '3' }}
        run: |
          echo "═══════════════════════════════════════"
          echo "  模式: $MODE"
          echo "  Batch: $BATCH, Interval: ${INTERVAL}s"
          echo "  时间墙: ${MAX_MIN} 分钟"
          echo "═══════════════════════════════════════"

          if [ "$MODE" = "daily-close-update" ]; then
            python slow_fetcher.py \
              --daily-close-update \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN" \
              --workers "$WORKERS"
          elif [ "$MODE" = "moneyflow" ]; then
            python slow_fetcher.py \
              --moneyflow --moneyflow-auto \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN"
          elif [ "$MODE" = "institutional" ]; then
            python slow_fetcher.py \
              --institutional \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN"
          elif [ "$MODE" = "lhb-snapshot" ]; then
            python slow_fetcher.py --lhb-snapshot
          elif [ "$MODE" = "dzjy-snapshot" ]; then
            python slow_fetcher.py --dzjy-snapshot
          else
            python slow_fetcher.py \
              --full-update \
              --batch "$BATCH" \
              --interval "$INTERVAL" \
              --max-minutes "$MAX_MIN" \
              --workers "$WORKERS"
          fi

      # ── 6. 打印状态 ──
      - name: Print status
        if: steps.trade_check.outputs.should_run == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python slow_fetcher.py --status

      # ── 7. 非交易日跳过 ──
      - name: Skip non-trade day
        if: steps.trade_check.outputs.should_run != 'true'
        run: echo "❌ 今天不是交易日, 跳过更新"
